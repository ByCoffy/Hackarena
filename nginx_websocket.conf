# =============================================================
# CTFArena - Nginx config con soporte WebSocket para terminal
# =============================================================
# Reemplaza /etc/nginx/sites-available/hackarena-ctf con este archivo
# sudo cp nginx_websocket.conf /etc/nginx/sites-available/hackarena-ctf
# sudo nginx -t && sudo systemctl restart nginx
# =============================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Proxy principal
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket para la terminal interactiva (socket.io)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para sesiones de terminal
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Archivos estáticos
    location /static {
        alias /opt/hackarena-ctf/app/static;
        expires 1d;
    }
}
