{% extends "base.html" %}
{% block title %}Unirse a Equipo — {{ ctf_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="mb-4"><i class="bi bi-box-arrow-in-right text-info me-2"></i>Unirse a un Equipo</h3>
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Código de Invitación</label>
                        <input type="text" name="invite_code" class="form-control bg-black border-secondary text-white"
                               required placeholder="Pega aquí el código">
                        <div class="form-text text-muted">Pide el código al líder del equipo.</div>
                    </div>
                    <button type="submit" class="btn btn-info">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Unirse
                    </button>
                    <a href="{{ url_for('teams.team_list') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
