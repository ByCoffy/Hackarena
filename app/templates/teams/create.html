{% extends "base.html" %}{% block title %}Crear Equipo{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-md-6"><h3 class="mb-4">Crear Equipo</h3><div class="card bg-dark border-secondary"><div class="card-body p-4">
<form method="POST"><div class="mb-3"><label class="form-label">Nombre</label><input type="text" name="name" class="form-control bg-black border-secondary text-white" required minlength="3"></div>
<div class="mb-3"><label class="form-label">Descripcion</label><textarea name="description" rows="3" class="form-control bg-black border-secondary text-white"></textarea></div>
<button class="btn btn-success">Crear</button><a href="{{ url_for('teams.team_list') }}" class="btn btn-outline-secondary ms-2">Cancelar</a></form></div></div></div></div>{% endblock %}
