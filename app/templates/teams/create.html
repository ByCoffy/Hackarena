{% extends "base.html" %}
{% block title %}Crear Equipo — {{ ctf_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="mb-4"><i class="bi bi-people-fill text-success me-2"></i>Crear Equipo</h3>
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Equipo</label>
                        <input type="text" name="name" class="form-control bg-black border-secondary text-white"
                               required minlength="3" placeholder="Team Awesome">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción (opcional)</label>
                        <textarea name="description" rows="3" maxlength="500"
                                  class="form-control bg-black border-secondary text-white"
                                  placeholder="Una breve descripción del equipo..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-plus-lg me-2"></i>Crear Equipo
                    </button>
                    <a href="{{ url_for('teams.team_list') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
