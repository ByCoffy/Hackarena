{% extends "base.html" %}
{% block title %}Categorías — Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags text-info me-2"></i>Categorías</h2>
    <a href="{{ url_for('admin.create_category') }}" class="btn btn-success btn-sm">
        <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
    </a>
</div>

<div class="row g-3">
    {% for cat in categories %}
    <div class="col-md-4">
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <h5><i class="{{ cat.icon }} me-2" style="color: {{ cat.color }}"></i>{{ cat.name }}</h5>
                <p class="text-muted small mb-2">{{ cat.description or 'Sin descripción' }}</p>
                <span class="badge bg-secondary">{{ cat.challenges.count() }} retos</span>
                <div class="mt-3">
                    <a href="{{ url_for('admin.edit_category', cat_id=cat.id) }}" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-pencil me-1"></i>Editar
                    </a>
                    <form method="POST" action="{{ url_for('admin.delete_category', cat_id=cat.id) }}" class="d-inline"
                          onsubmit="return confirm('¿Eliminar esta categoría?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary mt-4">
    <i class="bi bi-arrow-left me-2"></i>Volver al Panel
</a>
{% endblock %}
