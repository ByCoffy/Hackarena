{% extends "base.html" %}
{% block title %}Iniciar Sesión — {{ ctf_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card bg-dark border-success">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-success me-2"></i>Iniciar Sesión
                </h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Usuario o Email</label>
                        <input type="text" name="username" class="form-control bg-black border-secondary text-white"
                               required autofocus placeholder="tu_usuario">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-black border-secondary text-white"
                               required placeholder="••••••••">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Recordarme</label>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                    </button>
                </form>
                <hr class="border-secondary">
                <p class="text-center text-muted mb-0">
                    ¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="text-success">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
