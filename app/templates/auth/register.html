{% extends "base.html" %}{% block title %}Registro{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-md-5"><div class="card bg-dark border-success"><div class="card-body p-4">
<h3 class="text-center mb-4"><i class="bi bi-person-plus text-success me-2"></i>Crear Cuenta</h3>
<form method="POST"><div class="mb-3"><label class="form-label">Username</label><input type="text" name="username" class="form-control bg-black border-secondary text-white" required minlength="3"></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control bg-black border-secondary text-white" required></div>
<div class="mb-3"><label class="form-label">Contrasena</label><input type="password" name="password" class="form-control bg-black border-secondary text-white" required minlength="8"></div>
<div class="mb-3"><label class="form-label">Confirmar</label><input type="password" name="password2" class="form-control bg-black border-secondary text-white" required></div>
<button type="submit" class="btn btn-success w-100 fw-bold">Registrarse</button></form>
<hr class="border-secondary"><p class="text-center text-muted mb-0">Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" class="text-success">Login</a></p></div></div></div></div>{% endblock %}
