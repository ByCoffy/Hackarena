{% extends "base.html" %}
{% block title %}Editar Perfil — {{ ctf_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="mb-4"><i class="bi bi-pencil me-2"></i>Editar Perfil</h3>
        <div class="card bg-dark border-secondary">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" value="{{ current_user.email }}"
                               class="form-control bg-black border-secondary text-white" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea name="bio" rows="3" maxlength="500"
                                  class="form-control bg-black border-secondary text-white"
                                  placeholder="Cuéntanos algo sobre ti...">{{ current_user.bio }}</textarea>
                    </div>
                    <hr class="border-secondary">
                    <h6 class="text-muted">Cambiar Contraseña (opcional)</h6>
                    <div class="mb-3">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" name="new_password"
                               class="form-control bg-black border-secondary text-white"
                               placeholder="Dejar vacío para no cambiar" minlength="8">
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg me-2"></i>Guardar Cambios
                    </button>
                    <a href="{{ url_for('main.profile', username=current_user.username) }}" class="btn btn-outline-secondary ms-2">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
