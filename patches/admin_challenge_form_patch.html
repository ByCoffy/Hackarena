     PARCHE: Añadir este bloque en admin/challenge_form.html
     Insertarlo DESPUÉS del bloque de "Tiempo Límite" en el sidebar
     ============================================================= -->

            <!-- Interactive Challenge (Docker) -->
            <div class="card bg-dark border-secondary mt-3">
                <div class="card-body">
                    <h5><i class="bi bi-terminal me-2 text-success"></i>Reto Interactivo (Docker)</h5>

                    <div class="form-check form-switch mb-3">
                        <input type="checkbox" name="is_interactive" class="form-check-input" id="is_interactive"
                               {{ 'checked' if challenge and challenge.is_interactive }}
                               onchange="toggleDockerFields()">
                        <label class="form-check-label" for="is_interactive">Reto Interactivo</label>
                    </div>

                    <div id="docker-fields" style="{{ '' if challenge and challenge.is_interactive else 'display:none' }}">
                        <div class="mb-3">
                            <label class="form-label">Imagen Docker</label>
                            <input type="text" name="docker_image" class="form-control bg-black border-secondary text-white font-monospace"
                                   value="{{ challenge.docker_image if challenge and challenge.docker_image else '' }}"
                                   placeholder="ctfarena/privesc-suid">
                            <small class="text-muted">Nombre de la imagen construida con build_challenges.sh</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Timeout (segundos)</label>
                            <input type="number" name="container_timeout" class="form-control bg-black border-secondary text-white"
                                   value="{{ challenge.container_timeout if challenge else 1800 }}" min="60" max="7200">
                            <small class="text-muted">Máximo 2 horas (7200s). Por defecto 30 min.</small>
                        </div>

                        <div class="form-check form-switch">
                            <input type="checkbox" name="container_network" class="form-check-input" id="container_network"
                                   {{ 'checked' if challenge and challenge.container_network }}>
                            <label class="form-check-label" for="container_network">
                                Permitir red
                                <small class="text-muted d-block">⚠️ Solo si el reto lo necesita</small>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

<!-- JAVASCRIPT: Añadir en el bloque extra_scripts -->
<script>
function toggleDockerFields() {
    const fields = document.getElementById('docker-fields');
    const checkbox = document.getElementById('is_interactive');
    fields.style.display = checkbox.checked ? '' : 'none';
}
</script>
